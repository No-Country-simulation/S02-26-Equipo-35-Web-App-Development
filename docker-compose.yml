version: '3.9'

services:
  web:
    build:
      context: ./Backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./Backend:/app
    ports:
      - '8000:8000'
    depends_on:
      - redis
    env_file:
      - ./Backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0

  celery:
    build:
      context: ./Backend
    command: celery -A core worker --loglevel=info
    volumes:
      - ./Backend:/app
    depends_on:
      - redis
    env_file:
      - ./Backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  frontend:
    build:
      context: ./Frontend
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    ports:
      - '3000:5173'
    depends_on:
      - web
